<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — YSB Technologies</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;background:#0a1d38;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;overflow:hidden;position:relative}
.orb1{position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(0,194,203,.08);filter:blur(80px);top:-150px;right:-100px}
.orb2{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(109,54,219,.06);filter:blur(80px);bottom:-150px;left:-100px}
.content{position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:48px}
.logo-mark{position:relative;width:42px;height:42px}
.logo-mark .c1{position:absolute;width:32px;height:32px;border-radius:50%;background:#00C2CB;top:0;left:0}
.logo-mark .c2{position:absolute;width:19px;height:19px;border-radius:50%;background:#6D36DB;bottom:2px;right:3px}
.logo span{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.2rem;color:#fff}
.code{font-family:'Montserrat',sans-serif;font-size:8rem;font-weight:900;background:linear-gradient(135deg,#00C2CB,#6D36DB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
h1{font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:16px;color:#fff}
p{font-size:1rem;color:rgba(255,255,255,.5);max-width:440px;line-height:1.7;margin-bottom:36px}
.btn{font-family:'Montserrat',sans-serif;font-weight:700;font-size:.85rem;background:#00C2CB;color:#0a1d38;border:none;padding:14px 36px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s}
.btn:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,194,203,.25)}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="content">
  <div class="logo">
    <div class="logo-mark"><div class="c1"></div><div class="c2"></div></div>
    <span>YSB Technologies</span>
  </div>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour découvrir nos solutions.</p>
  <a href="/" class="btn">Retour à l'accueil <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10m0 0L9 4m4 4L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
</div>
</body>
</html>
